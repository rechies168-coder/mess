<!-- Содержимое для login.html и register.html (можно сделать через шаблоны, но дам отдельно для ясности) -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход в iMSITChat</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { width: 350px; padding: 30px; background: #1e1e1e; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; margin-bottom: 30px; font-weight: 300; }

        /* Стиль инпута как на скриншоте */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group label {
            position: absolute; top: -10px; left: 12px; background: #1e1e1e;
            padding: 0 5px; font-size: 12px; color: #8a8dff; z-index: 1;
        }
        .input-group input {
            width: 100%; padding: 12px; background: transparent;
            border: 1.5px solid #333; border-radius: 8px; color: white; outline: none; box-sizing: border-box;
        }
        .input-group input:focus { border-color: #8a8dff; }

        button {
            width: 100%; padding: 12px; background: #8a8dff; border: none;
            border-radius: 8px; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #6c6fff; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: #aaa; }
        .footer-link a { color: #8a8dff; text-decoration: none; }
        .error { color: #ff5555; font-size: 13px; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>
    <!-- Это пример для login.html -->
    <div class="auth-card">
        <h2>Вход</h2>
        <div id="error-msg" class="error"></div>
        <div class="input-group">
            <label>Имя пользователя</label>
            <input type="text" id="username">
        </div>
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="password">
        </div>
        <button onclick="doLogin()">Войти</button>
        <div class="footer-link">Нет аккаунта? <a href="/register">Создать</a></div>
    </div>

    <script>
        function doLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            }).then(r => r.json()).then(data => {
                if(data.success) window.location.href = '/';
                else document.getElementById('error-msg').innerText = data.error;
            });
        }
    </script>
</body>
</html>
