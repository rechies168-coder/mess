<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>iMSITChat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <!-- Settings Overlay -->
    <div id="settings" class="settings-pane">
        <div class="settings-header"><span id="closeSettings">←</span> <b>Settings</b></div>
        <img id="my-av" class="profile-av" src="" onclick="document.getElementById('avatarInput').click()">
        <input type="file" id="avatarInput" style="display:none" accept="image/*">
        <h2 id="my-name"></h2>
        <div class="info-item"><span>@</span><div class="info-text"><div id="my-user"></div><div>Username</div></div></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="search-area">
            <span id="openSettings">☰</span>
            <input type="text" id="searchInput" placeholder="Поиск">
        </div>
        <div id="rooms-list"></div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
        <div id="chat-header" class="chat-header" style="display:none"></div>
        <div id="messages" class="messages"></div>
        <div id="emojis" class="emoji-list">
            <span class="emoji">😊</span><span class="emoji">😂</span><span class="emoji">❤️</span><span class="emoji">🔥</span><span class="emoji">👍</span>
        </div>
        <div class="input-bar" id="input-bar" style="display:none">
            <span class="icon" id="emojiBtn">😊</span>
            <input type="text" id="msgInput" placeholder="Message">
            <span class="icon" id="micBtn">🎤</span>
            <span class="icon" id="sendBtn">➤</span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/index.js') }}"></script>
</body>
</html>
